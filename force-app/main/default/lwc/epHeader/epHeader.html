<template>
    <div class="ep-header">
        <div class="header-left">
            <span class="portal-title">⚡ Staff Portal</span>
        </div>
        <div class="header-nav">
            <button class="nav-btn" data-tab="dashboard" onclick={handleNav}>Dashboard</button>
            <button class="nav-btn" data-tab="shifts" onclick={handleNav}>My Shifts</button>
            <button class="nav-btn" data-tab="schedule" onclick={handleNav}>Schedule</button>
            <button class="nav-btn" data-tab="timeoff" onclick={handleNav}>Time Off</button>
            <template if:true={isManager}>
                <button class="nav-btn manager-btn" data-tab="manager" onclick={handleNav}>
                    Manager ▾
                </button>
            </template>
        </div>
        <div class="header-right">
            <img class="avatar" src={userPhoto} alt="Profile"/>
            <span class="user-name">{userName}</span>
        </div>
    </div>
</template>
