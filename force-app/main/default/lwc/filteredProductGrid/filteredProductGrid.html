<template>
    <!-- Mini Cart Popup -->
    <template if:true={showCartPopup}>
        <c-cart-popup
            cart-items={cartItems}
            cart-count={cartCount}
            last-added-product={lastAddedProduct}
            onclose={handleClosePopup}
            onviewcart={handleViewCart}>
        </c-cart-popup>
    </template>

    <!-- Empty State -->
    <template if:false={hasProducts}>
        <div class="empty-state">
            <p>No products found. Try a different search or category.</p>
        </div>
    </template>

    <!-- Product Grid -->
    <template if:true={hasProducts}>
        <div class="grid">
            <template for:each={products} for:item="product">
                <div key={product.Id}
                     class="card"
                     data-id={product.Id}
                     onclick={handleNavigate}>

                    <template if:true={product._showOfferRibbon}>
                        <div class="ribbon">Offer</div>
                    </template>

                    <div class="image-container">
                        <img if:true={product.Product_Image_Field__c}
                             src={product.Product_Image_Field__c}
                             alt={product.Name}/>
                        <img if:false={product.Product_Image_Field__c}
                             src="https://via.placeholder.com/400x400?text=No+Image"
                             alt="Placeholder"/>
                    </div>

                    <div class="card-content">
                        <h3>{product.Name}</h3>
                        <div class="pricing">
                            <div class="price-row">
                                <span class="price-label">Regular</span>
                                <span class="regular-price">{product.formattedRegular}</span>
                            </div>
                            <template if:true={product._showMemberPrice}>
                                <div class="price-row member-row">
                                    <span class="label-text">Member Price</span>
                                    <span class="member-price">{product.formattedMember}</span>
                                </div>
                            </template>
                        </div>
                        <button data-id={product.Id} onclick={handleAddToCart}>Add to Cart</button>
                    </div>
                </div>
            </template>
        </div>
    </template>
</template>
