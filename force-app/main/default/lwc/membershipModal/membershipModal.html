<template>
    <div class="slds-backdrop slds-backdrop_open"></div>
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_small">
        <div class="slds-modal__container">
            
            <header class="slds-modal__header">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleClose}>
                    X
                </button>
                <div class="slds-m-bottom_small">
                    <img src={logoUrl} alt="Point n Pour" style="height: 50px;">
                </div>
                <h2 class="slds-text-heading_medium">Membership Card</h2>
            </header>

            <div class="slds-modal__content slds-p-around_medium slds-text-align_center">
                <template if:true={member}>
                    <p class="slds-text-title_caps">Member Number</p>
                    <p class="slds-text-heading_large slds-m-bottom_medium">{member.Memeber_number__c}</p>
                    
                    <div class="qr-section slds-box slds-theme_shade">
                        <p class="slds-text-title_caps">Your QR Code</p>
                        <template if:true={barcodeUrl}>
                            <img src={barcodeUrl} alt="Barcode" style="max-width: 200px; height: auto;" class="slds-m-top_small">
                        </template>
                    </div>
                </template>

                <template if:true={error}>
                    <p class="slds-text-color_error">Could not find membership data.</p>
                </template>
            </div>

            <footer class="slds-modal__footer">
                <button class="slds-button slds-button_brand" onclick={handleClose}>Close</button>
            </footer>
        </div>
    </section>
</template>
