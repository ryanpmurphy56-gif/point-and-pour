<template>
    <div class="timeoff-container">
        <h2 class="section-title">Time Off Requests</h2>

        <div class="request-form">
            <h3 class="form-title">Submit New Request</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" class="form-input" data-field="startDate" onchange={handleInput}/>
                </div>
                <div class="form-group">
                    <label>End Date</label>
                    <input type="date" class="form-input" data-field="endDate" onchange={handleInput}/>
                </div>
            </div>
            <div class="form-group">
                <label>Reason</label>
                <textarea class="form-input" data-field="reason" onchange={handleInput}
                          placeholder="Please describe your reason for leave..."></textarea>
            </div>
            <button class="submit-btn" onclick={handleSubmit}>Submit Request</button>
        </div>

        <div class="requests-list">
            <h3 class="form-title">My Requests</h3>
            <template if:true={hasRequests}>
                <template for:each={requests} for:item="req">
                    <div key={req.Id} class="request-card">
                        <div class="request-dates">
                            <span class="date-range">{req._dateRange}</span>
                        </div>
                        <div class="request-reason">{req.Reason__c}</div>
                        <div class="request-status">
                            <span class={req._statusClass}>{req.Status__c}</span>
                        </div>
                        <template if:true={req.Manager_Notes__c}>
                            <div class="manager-notes">💬 {req.Manager_Notes__c}</div>
                        </template>
                    </div>
                </template>
            </template>
            <template if:false={hasRequests}>
                <div class="empty-state">No time off requests yet.</div>
            </template>
        </div>
    </div>
</template>
