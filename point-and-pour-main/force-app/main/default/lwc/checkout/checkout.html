<template>
    <div class="checkout-container">

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="loading-state">
                <lightning-spinner alternative-text="Loading checkout..." size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Order Confirmed -->
        <template if:true={orderPlaced}>
            <div class="confirmation">
                <div class="confirmation-icon">✅</div>
                <h2 class="confirmation-title">Order Confirmed!</h2>
                <p class="confirmation-sub">Thanks for your order — payment received. We'll email you a confirmation shortly.</p>
                <p class="confirmation-ref">Order reference: <strong>{orderId}</strong></p>
                <template if:true={isDelivery}>
                    <p class="confirmation-sub">Your order will be delivered to <strong>{deliveryStreet}, {deliverySuburb}</strong>. Please have your ID ready.</p>
                </template>
                <template if:false={isDelivery}>
                    <p class="confirmation-sub">Your order will be ready for <strong>Click &amp; Collect</strong> within 2 hours. Please bring your ID.</p>
                </template>
                <button class="primary-btn" onclick={handleContinueShopping}>Continue Shopping</button>
            </div>
        </template>

        <!-- Checkout Form -->
        <template if:false={orderPlaced}>
            <template if:false={isLoading}>

                <h2 class="checkout-title">Checkout</h2>

                <div class="checkout-layout">

                    <!-- LEFT: Form -->
                    <div class="checkout-form">

                        <!-- Step 1: Fulfilment -->
                        <div class="form-section">
                            <h3 class="section-title">1. How would you like to receive your order?</h3>
                            <div class="fulfilment-options">
                                <button class={deliveryBtnClass} onclick={handleSelectDelivery}>
                                    🚚 Delivery
                                </button>
                                <button class={collectBtnClass} onclick={handleSelectCollect}>
                                    🏪 Click &amp; Collect
                                </button>
                            </div>
                            <template if:true={isDelivery}>
                                <p class="fulfilment-note">We deliver to the Melbourne metro area. Flat delivery fee: <strong>$9.95</strong>. Same-day or next-day.</p>
                            </template>
                            <template if:false={isDelivery}>
                                <p class="fulfilment-note">Ready within 2 hours during opening hours. Free collection. Bring your ID.</p>
                            </template>
                        </div>

                        <!-- Step 2: Delivery Address -->
                        <template if:true={isDelivery}>
                            <div class="form-section">
                                <h3 class="section-title">2. Delivery Address</h3>
                                <div class="form-group">
                                    <label class="form-label">Street Address *</label>
                                    <input type="text" class="form-input" placeholder="e.g. 12 Smith Street"
                                        value={deliveryStreet} data-field="deliveryStreet" oninput={handleFieldChange} />
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label">Suburb *</label>
                                        <input type="text" class="form-input" placeholder="e.g. Fitzroy"
                                            value={deliverySuburb} data-field="deliverySuburb" oninput={handleFieldChange} />
                                    </div>
                                    <div class="form-group form-group--small">
                                        <label class="form-label">Postcode *</label>
                                        <input type="text" class="form-input" placeholder="3000" maxlength="4"
                                            value={deliveryPostcode} data-field="deliveryPostcode" oninput={handleFieldChange} />
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Delivery Notes (optional)</label>
                                    <input type="text" class="form-input" placeholder="e.g. Leave at door, buzz unit 4"
                                        value={deliveryNotes} data-field="deliveryNotes" oninput={handleFieldChange} />
                                </div>
                            </div>
                        </template>

                        <!-- Step 3 / 2: Payment -->
                        <div class="form-section">
                            <h3 class="section-title">{paymentStepLabel}. Payment</h3>

                            <template if:false={stripeReady}>
                                <div class="stripe-loading">
                                    <lightning-spinner size="small" alternative-text="Loading payment form..."></lightning-spinner>
                                    <span>Loading secure payment form...</span>
                                </div>
                            </template>

                            <!-- Stripe mounts the card element here -->
                            <div class="stripe-card-wrapper" lwc:ref="stripeCardWrapper">
                                <div class="stripe-card-input" lwc:ref="stripeCardElement"></div>
                                <div class="stripe-card-errors" lwc:ref="stripeCardErrors"></div>
                            </div>

                            <div class="stripe-badge">
                                🔒 Payments secured by <strong>Stripe</strong>
                            </div>
                        </div>

                        <!-- Step 4 / 3: Age Verification -->
                        <div class="form-section">
                            <h3 class="section-title">{ageStepLabel}. Age Verification</h3>
                            <label class="checkbox-label">
                                <input type="checkbox" class="checkbox-input"
                                    checked={ageVerified} onchange={handleAgeVerify} />
                                <span>I confirm I am 18 years or older and I understand that valid photo ID (driver's licence, passport, or Victorian proof-of-age card) will be required on delivery or collection.</span>
                            </label>
                        </div>

                        <!-- Validation / Payment Error -->
                        <template if:true={errorMessage}>
                            <p class="validation-error">⚠️ {errorMessage}</p>
                        </template>

                        <!-- Place Order -->
                        <button class="place-order-btn" onclick={handlePlaceOrder} disabled={isPlacing}>
                            <template if:true={isPlacing}>{placingLabel}</template>
                            <template if:false={isPlacing}>Pay &amp; Place Order — {formattedTotal}</template>
                        </button>

                        <p class="secure-note">Your card is charged now. No order is created unless payment succeeds.</p>

                    </div>

                    <!-- RIGHT: Order Summary -->
                    <div class="order-summary">
                        <h3 class="summary-title">Order Summary</h3>

                        <template if:true={hasItems}>
                            <div class="summary-items">
                                <template for:each={cartItems} for:item="item">
                                    <div key={item.cartItemId} class="summary-item">
                                        <div class="summary-item-info">
                                            <span class="summary-item-name">{item.productName}</span>
                                            <span class="summary-item-qty">× {item.quantity}</span>
                                        </div>
                                        <span class="summary-item-total">{item.formattedLineTotal}</span>
                                    </div>
                                </template>
                            </div>

                            <div class="summary-totals">
                                <div class="summary-row">
                                    <span>Subtotal</span>
                                    <span>{formattedSubtotal}</span>
                                </div>
                                <template if:true={hasMemberSavings}>
                                    <div class="summary-row savings-row">
                                        <span>Member Savings</span>
                                        <span>−{formattedMemberSavings}</span>
                                    </div>
                                </template>
                                <template if:true={isDelivery}>
                                    <div class="summary-row">
                                        <span>Delivery Fee</span>
                                        <span>$9.95</span>
                                    </div>
                                </template>
                                <template if:false={isDelivery}>
                                    <div class="summary-row">
                                        <span>Click &amp; Collect</span>
                                        <span class="free-label">FREE</span>
                                    </div>
                                </template>
                                <div class="summary-row total-row">
                                    <span>Total</span>
                                    <span class="total-amount">{formattedTotal}</span>
                                </div>
                            </div>
                        </template>

                        <template if:false={hasItems}>
                            <p class="empty-note">Your cart is empty.</p>
                        </template>
                    </div>

                </div>
            </template>
        </template>

    </div>
</template>
