<template>
    <!-- Category Buttons -->
    <div class="categories">
        <button onclick={handleFamilyChange} value="Beer">Beer</button>
        <button onclick={handleFamilyChange} value="Wine">Wine</button>
        <button onclick={handleFamilyChange} value="Spirits">Spirits</button>
        <button onclick={handleFamilyChange} value="Offers">Offers</button>
    </div>

    <!-- Subtype Filter Buttons -->
    <!-- <template if:true={products}>
        <div class="subtypes">
            <template for:each={products} for:item="product">
                <button key={product.Id}
                        onclick={handleSubFamilyChange}
                        value={product.Product_Sub_Family__c}>
                    {product.Product_Sub_Family__c}
                </button>
            </template>
        </div>
    </template> -->

    <div class="grid">
        <template for:each={products} for:item="product">
            <div key={product.Id}
                 class="card"
                 data-id={product.Id}
                 onclick={handleNavigate}>

                <!-- Show ribbon only when member price exists and is lower than regular -->
                <template if:true={product._showOfferRibbon}>
                    <div class="ribbon">Offer</div>
                </template>

                <div class="image-container">
                    <img if:true={product.Product_Image_Field__c}
                         src={product.Product_Image_Field__c}
                         alt={product.Name}/>
                    <img if:false={product.Product_Image_Field__c}
                         src="https://via.placeholder.com/400x400?text=No+Image"
                         alt="Placeholder"/>
                </div>

                <div class="card-content">
                    <h3>{product.Name}</h3>

                    <!-- ===================== PRICING ===================== -->
                    <div class="pricing">
                        <!-- Main/regular price -->
                        <div class="price-row">
                            <span class="price-label">Price</span>
                            <span class="regular-price">REGULAR {product.formattedRegular}</span>
                        </div>

                        <!-- Member price (only if present and different) -->
                        <template if:true={product._showMemberPrice}>
                            <div class="price-row member-row">
                                <span class="label-text">Member Price</span>
                                <span class="member-price">{product.formattedMember}</span>
                            </div>
                        </template>
                    </div>
                    <!-- =================== END PRICING =================== -->

                    <button data-id={product.Id} onclick={handleAddToCart}>Add to Cart</button>
                </div>
            </div>
        </template>
    </div>
</template>
